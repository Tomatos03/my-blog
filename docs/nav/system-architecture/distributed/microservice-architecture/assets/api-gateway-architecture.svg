  <line x1="160" y1="632" x2="190" y2="632" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" />
  <text x="198" y="636" font-family="'Segoe UI',system-ui,sans-serif" font-size="9.5" fill="#94a3b8">客户端请求</text>

