  <text x="1015" y="400" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="9" fill="#fca5a5">RabbitMQ</text>

  <!-- ES -->
  <rect x="975" y="455" width="80" height="60" rx="6" fill="#201616" stroke="#ef4444" stroke-width="0.8" />
  <text x="1015" y="480" text-anchor="middle" font-size="16">🔍</text>
  <text x="1015" y="500" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="9" fill="#fca5a5">Elasticsearch</text>

