  <circle cx="700" cy="487" r="12" fill="#14532d" stroke="#22c55e" stroke-width="1" />
  <text x="700" y="492" text-anchor="middle" font-size="13">🔔</text>
  <text x="720" y="481" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">通知服务</text>
  <text x="720" y="498" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" fill="#4ade80">短信 · 邮件 · 推送</text>
  <rect x="800" y="462" width="40" height="18" rx="9" fill="#14532d" stroke="#22c55e" stroke-width="0.5" />
