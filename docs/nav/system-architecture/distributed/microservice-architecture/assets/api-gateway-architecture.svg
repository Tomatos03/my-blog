  <path d="M 870 187 C 910 187, 920 220, 960 220" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)" opacity="0.8" />
  <path d="M 870 287 C 910 287, 920 320, 960 320" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)" opacity="0.8" />
