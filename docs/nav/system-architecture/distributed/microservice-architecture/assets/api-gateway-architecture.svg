  <text x="820" y="274" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="8" fill="#86efac">×3</text>

  <!-- 支付服务 -->
  <rect x="680" y="355" width="170" height="65" rx="8" fill="#162016" stroke="#22c55e" stroke-width="1" />
