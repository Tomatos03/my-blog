<svg viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 箭头标记 -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#a78bfa" />
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#34d399" />
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#fbbf24" />
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#22d3ee" />
    </marker>

    <!-- 渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a" />
      <stop offset="100%" stop-color="#1a1a2e" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="gwGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#1a1636" />
    </linearGradient>
    <linearGradient id="msGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e1a" />
      <stop offset="100%" stop-color="#162016" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1a1a" />
      <stop offset="100%" stop-color="#201616" />
    </linearGradient>
    <linearGradient id="glowCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0" />
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </linearGradient>

    <!-- 辉光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1100" height="680" fill="url(#bgGrad)" rx="12" />
  <!-- 背景网格 -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5" />
  </pattern>
  <rect width="1100" height="680" fill="url(#grid)" rx="12" />

  <!-- ===== 标题区 ===== -->
  <text x="550" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="700" font-size="22" fill="#e2e8f0" letter-spacing="2">API 网关架构</text>
  <text x="550" y="62" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="11" fill="#64748b" letter-spacing="4">GATEWAY ARCHITECTURE</text>

  <!-- ===== 区域: 客户端 ===== -->
  <rect x="30" y="100" width="160" height="480" rx="10" fill="url(#clientGrad)" stroke="#334155" stroke-width="1" />
  <rect x="30" y="100" width="160" height="36" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" />
  <rect x="30" y="126" width="160" height="10" fill="#1e293b" />
  <text x="110" y="123" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#94a3b8" letter-spacing="2">CLIENTS</text>

  <!-- 客户端图标: Web -->
  <rect x="50" y="160" width="120" height="65" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1" />
  <rect x="58" y="170" width="104" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5" />
  <!-- 浏览器小图标 -->
  <circle cx="65" cy="177" r="2.5" fill="#ef4444" />
  <circle cx="73" cy="177" r="2.5" fill="#fbbf24" />
  <circle cx="81" cy="177" r="2.5" fill="#22c55e" />
  <rect x="58" y="184" width="104" height="1" fill="#334155" />
  <text x="110" y="216" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8">Web Browser</text>

  <!-- 客户端图标: Mobile -->
  <rect x="50" y="250" width="120" height="65" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1" />
  <rect x="85" y="258" width="50" height="38" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5" />
  <rect x="93" y="262" width="34" height="24" rx="2" fill="#0f172a" />
  <circle cx="110" cy="291" r="3" fill="none" stroke="#475569" stroke-width="0.8" />
  <text x="110" y="326" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8">Mobile App</text>

  <!-- 客户端图标: 第三方 -->
  <rect x="50" y="340" width="120" height="65" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1" />
  <!-- 代码括号图标 -->
  <text x="110" y="375" text-anchor="middle" font-family="'Courier New',monospace" font-weight="700" font-size="22" fill="#64748b">{   }</text>
  <text x="110" y="396" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8">3rd Party API</text>

  <!-- 客户端图标: IoT -->
  <rect x="50" y="430" width="120" height="65" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1" />
  <!-- 芯片图标 -->
  <rect x="93" y="445" width="34" height="28" rx="3" fill="#1e293b" stroke="#64748b" stroke-width="1" />
  <line x1="93" y1="452" x2="89" y2="452" stroke="#64748b" stroke-width="1" />
  <line x1="93" y1="458" x2="89" y2="458" stroke="#64748b" stroke-width="1" />
  <line x1="93" y1="464" x2="89" y2="464" stroke="#64748b" stroke-width="1" />
  <line x1="127" y1="452" x2="131" y2="452" stroke="#64748b" stroke-width="1" />
  <line x1="127" y1="458" x2="131" y2="458" stroke="#64748b" stroke-width="1" />
  <line x1="127" y1="464" x2="131" y2="464" stroke="#64748b" stroke-width="1" />
  <line x1="100" y1="445" x2="100" y2="441" stroke="#64748b" stroke-width="1" />
  <line x1="110" y1="445" x2="110" y2="441" stroke="#64748b" stroke-width="1" />
  <line x1="120" y1="445" x2="120" y2="441" stroke="#64748b" stroke-width="1" />
  <line x1="100" y1="473" x2="100" y2="477" stroke="#64748b" stroke-width="1" />
  <line x1="110" y1="473" x2="110" y2="477" stroke="#64748b" stroke-width="1" />
  <line x1="120" y1="473" x2="120" y2="477" stroke="#64748b" stroke-width="1" />
  <text x="110" y="490" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500" font-size="10" fill="#94a3b8">IoT Devices</text>

  <!-- ===== 客户端 → API网关 流线 ===== -->
  <path d="M 190 192 C 240 192, 240 220, 280 220" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" opacity="0.8" />
  <path d="M 190 282 C 240 282, 240 270, 280 270" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" opacity="0.8" />
  <path d="M 190 372 C 240 372, 240 320, 280 320" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" opacity="0.8" />
  <path d="M 190 462 C 240 462, 240 370, 280 370" fill="none" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)" opacity="0.8" />

  <!-- ===== 区域: API网关 ===== -->
  <rect x="280" y="100" width="260" height="480" rx="10" fill="url(#gwGrad)" stroke="#6d28d9" stroke-width="1.5" />
  <!-- 网关顶部发光条 -->
  <rect x="280" y="100" width="260" height="36" rx="10" fill="#2e1065" stroke="#6d28d9" stroke-width="1" />
  <rect x="280" y="126" width="260" height="10" fill="#2e1065" />
  <text x="410" y="123" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#c4b5fd" letter-spacing="3">API GATEWAY</text>

  <!-- 内部组件: 路由 -->
  <rect x="305" y="155" width="210" height="55" rx="8" fill="#1a1636" stroke="#7c3aed" stroke-width="1" />
  <circle cx="325" cy="182" r="12" fill="#2e1065" stroke="#7c3aed" stroke-width="1" />
  <text x="325" y="187" text-anchor="middle" font-size="14">🔀</text>
  <text x="345" y="178" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">路由 Router</text>
  <text x="345" y="195" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" fill="#7c3aed">请求分发 · 路径匹配 · 协议转换</text>

  <!-- 内部组件: 认证鉴权 -->
  <rect x="305" y="225" width="210" height="55" rx="8" fill="#1a1636" stroke="#7c3aed" stroke-width="1" />
  <circle cx="325" cy="252" r="12" fill="#2e1065" stroke="#7c3aed" stroke-width="1" />
  <text x="325" y="257" text-anchor="middle" font-size="14">🔐</text>
  <text x="345" y="248" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">认证鉴权 Auth</text>
  <text x="345" y="265" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" fill="#7c3aed">JWT · OAuth2 · RBAC 权限校验</text>

  <!-- 内部组件: 限流熔断 -->
  <rect x="305" y="295" width="210" height="55" rx="8" fill="#1a1636" stroke="#7c3aed" stroke-width="1" />
  <circle cx="325" cy="322" r="12" fill="#2e1065" stroke="#7c3aed" stroke-width="1" />
  <text x="325" y="327" text-anchor="middle" font-size="14">⚡</text>
  <text x="345" y="318" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">限流熔断 Throttle</text>
  <text x="345" y="335" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" fill="#7c3aed">令牌桶 · 熔断器 · 降级策略</text>

  <!-- 内部组件: 负载均衡 -->
  <rect x="305" y="365" width="210" height="55" rx="8" fill="#1a1636" stroke="#7c3aed" stroke-width="1" />
  <circle cx="325" cy="392" r="12" fill="#2e1065" stroke="#7c3aed" stroke-width="1" />
  <text x="325" y="397" text-anchor="middle" font-size="14">⚖️</text>
  <text x="345" y="388" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">负载均衡 LB</text>
  <text x="345" y="405" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" fill="#7c3aed">轮询 · 加权 · 一致性哈希</text>

  <!-- 内部组件: 日志监控 -->
  <rect x="305" y="435" width="210" height="55" rx="8" fill="#1a1636" stroke="#7c3aed" stroke-width="1" />
  <circle cx="325" cy="462" r="12" fill="#2e1065" stroke="#7c3aed" stroke-width="1" />
  <text x="325" y="467" text-anchor="middle" font-size="14">📊</text>
  <text x="345" y="458" font-family="'Segoe UI',system-ui,sans-serif" font-weight="600" font-size="12" fill="#e2e8f0">可观测性 Observe</text>
  <text x="345" y="475" font-family="'Segoe UI',system-ui,sans-serif" font-weight="400" font-size="9.5" fill="#7c3aed">日志 · 指标 · 链路追踪</text>

  <!-- 网关内部纵向流动线 -->
  <line x1="410" y1="210" x2="410" y2="225" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" />
  <line x1="410" y1="280" x2="410" y2="295" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" />
  <line x1="410" y1="350" x2="410" y2="365" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" />
  <line x1="410" y1="420" x2="410" y2="435" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5" />

  <!-- ===== API网关 → 微服务 流线 ===== -->
  <path d="M 540 182 C 590 182, 610 220, 660 220" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="0.8" />
  <path d="M 540 392 C 590 392, 610 320, 660 320" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="0.8" />
  <path d="M 540 462 C 590 462, 610 420, 660 420" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="0.8" />

