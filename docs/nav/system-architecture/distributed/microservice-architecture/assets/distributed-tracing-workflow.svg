<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- 参与者竖线 -->
  <line x1="150" y1="80" x2="150" y2="750" stroke="#999" stroke-dasharray="5,5" />
  <line x1="350" y1="80" x2="350" y2="750" stroke="#999" stroke-dasharray="5,5" />
  <line x1="550" y1="80" x2="550" y2="750" stroke="#999" stroke-dasharray="5,5" />
  <line x1="750" y1="80" x2="750" y2="750" stroke="#999" stroke-dasharray="5,5" />
  <line x1="1050" y1="80" x2="1050" y2="750" stroke="#999" stroke-dasharray="5,5" />

  <!-- 参与者标签 -->
  <rect x="80" y="40" width="140" height="40" fill="#e8f4f8" stroke="#333" rx="5" />
  <text x="150" y="65" text-anchor="middle" font-weight="bold">Client</text>

  <rect x="280" y="40" width="140" height="40" fill="#e8f4f8" stroke="#333" rx="5" />
  <text x="350" y="65" text-anchor="middle" font-weight="bold">Service1</text>

  <rect x="480" y="40" width="140" height="40" fill="#e8f4f8" stroke="#333" rx="5" />
  <text x="550" y="65" text-anchor="middle" font-weight="bold">Service2</text>

  <rect x="680" y="40" width="140" height="40" fill="#e8f4f8" stroke="#333" rx="5" />
  <text x="750" y="65" text-anchor="middle" font-weight="bold">Service3</text>

  <rect x="980" y="40" width="140" height="40" fill="#fff3cd" stroke="#333" rx="5" />
  <text x="1050" y="65" text-anchor="middle" font-weight="bold">追踪系统</text>

  <!-- 请求1: Client -> Service1 -->
  <line x1="150" y1="130" x2="350" y2="130" stroke="#333" marker-end="url(#arrowhead)" />
  <text x="250" y="120" text-anchor="middle" font-size="12" fill="#666">请求 (TraceID: abc123)</text>

  <!-- Service1 记录Span1 -->
  <line x1="350" y1="160" x2="1050" y2="160" stroke="#0d6efd" marker-end="url(#arrowhead)" />
  <text x="700" y="150" text-anchor="middle" font-size="12" fill="#0d6efd">记录 Span1</text>

  <!-- 请求2: Service1 -> Service2 -->
  <line x1="350" y1="200" x2="550" y2="200" stroke="#333" marker-end="url(#arrowhead)" />
  <text x="450" y="190" text-anchor="middle" font-size="12" fill="#666">请求 (TraceID: abc123)</text>

  <!-- Service2 记录Span2 -->
  <line x1="550" y1="230" x2="1050" y2="230" stroke="#0d6efd" marker-end="url(#arrowhead)" />
  <text x="800" y="220" text-anchor="middle" font-size="12" fill="#0d6efd">记录 Span2</text>

  <!-- 请求3: Service2 -> Service3 -->
  <line x1="550" y1="270" x2="750" y2="270" stroke="#333" marker-end="url(#arrowhead)" />
  <text x="650" y="260" text-anchor="middle" font-size="12" fill="#666">请求 (TraceID: abc123)</text>

  <!-- Service3 记录Span3 -->
  <line x1="750" y1="300" x2="1050" y2="300" stroke="#0d6efd" marker-end="url(#arrowhead)" />
  <text x="900" y="290" text-anchor="middle" font-size="12" fill="#0d6efd">记录 Span3</text>

  <!-- 响应流程 -->
  <line x1="750" y1="350" x2="550" y2="350" stroke="#6c757d" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="650" y="340" text-anchor="middle" font-size="12" fill="#666">响应</text>

  <line x1="550" y1="390" x2="350" y2="390" stroke="#6c757d" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="450" y="380" text-anchor="middle" font-size="12" fill="#666">响应</text>

  <line x1="350" y1="430" x2="150" y2="430" stroke="#6c757d" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="250" y="420" text-anchor="middle" font-size="12" fill="#666">响应</text>

  <!-- 追踪系统处理 -->
  <rect x="950" y="480" width="200" height="60" fill="#fff3cd" stroke="#333" rx="5" />
  <text x="1050" y="505" text-anchor="middle" font-size="12" font-weight="bold">根据 TraceID</text>
  <text x="1050" y="525" text-anchor="middle" font-size="12" font-weight="bold">整合所有 Span</text>

  <!-- 生成链路 -->
  <rect x="950" y="570" width="200" height="60" fill="#fff3cd" stroke="#333" rx="5" />
  <text x="1050" y="600" text-anchor="middle" font-size="12" font-weight="bold">生成完整</text>
  <text x="1050" y="620" text-anchor="middle" font-size="12" font-weight="bold">调用链路</text>

  <!-- 处理流程箭头 -->
  <line x1="1050" y1="360" x2="1050" y2="480" stroke="#ff6b6b" marker-end="url(#arrowhead)" stroke-width="2" />
  <line x1="1050" y1="540" x2="1050" y2="570" stroke="#ff6b6b" marker-end="url(#arrowhead)" stroke-width="2" />

  <!-- 图例 -->
  <text x="200" y="800" font-size="12" fill="#666">— 请求流程</text>
  <text x="400" y="800" font-size="12" fill="#0d6efd">— 记录数据</text>
  <text x="650" y="800" font-size="12" fill="#ff6b6b">— 数据处理</text>
</svg>
