<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义样式 -->
  <defs>
    <style>
      .node { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
      .decision { fill: #fff9c4; stroke: #fbc02d; stroke-width: 2; }
      .action { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; }
      .reject { fill: #ffebee; stroke: #d32f2f; stroke-width: 2; }
      .node-text { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #0d47a1; text-anchor: middle; dominant-baseline: middle; }
      .decision-text { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 12px; fill: #5f4339; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #546e7a; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .edge-text { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 12px; font-weight: bold; fill: #455a64; text-anchor: middle; }
      .arrowhead { fill: #546e7a; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrowhead"/>
    </marker>
  </defs>

  <!-- 节点定义 -->
  <!-- 提交任务 -->
  <rect x="320" y="20" width="160" height="46" rx="8" class="node"/>
  <text x="400" y="43" class="node-text">提交任务</text>

  <!-- 判断节点1: 当前线程数 < corePoolSize? -->
  <polygon points="400,100 520,135 400,170 280,135" class="decision"/>
  <text x="400" y="128" class="decision-text">当前线程数</text>
  <text x="400" y="145" class="decision-text">&lt; corePoolSize?</text>

  <!-- 执行节点: 创建核心线程 -->
  <rect x="580" y="112" width="160" height="46" rx="8" class="action"/>
  <text x="660" y="135" class="node-text">创建核心线程执行</text>

  <!-- 判断节点2: 任务队列未满? -->
  <polygon points="400,210 520,245 400,280 280,245" class="decision"/>
  <text x="400" y="245" class="decision-text">任务队列未满?</text>

  <!-- 执行节点: 放入队列 -->
  <rect x="580" y="222" width="160" height="46" rx="8" class="action"/>
  <text x="660" y="245" class="node-text">放入阻塞队列等待</text>

  <!-- 判断节点3: 当前线程数 < maximumPoolSize? -->
  <polygon points="400,320 520,355 400,390 280,355" class="decision"/>
  <text x="400" y="348" class="decision-text">当前线程数</text>
  <text x="400" y="365" class="decision-text">&lt; maxPoolSize?</text>

  <!-- 执行节点: 创建非核心线程 -->
  <rect x="580" y="332" width="160" height="46" rx="8" class="action"/>
  <text x="660" y="355" class="node-text">创建非核心线程执行</text>

  <!-- 拒绝节点 -->
  <rect x="320" y="430" width="160" height="46" rx="8" class="reject"/>
  <text x="400" y="453" class="node-text">触发拒绝策略</text>

  <!-- 连接线 -->
  <!-- 提交任务 -> 判断1 -->
  <path d="M 400 66 L 400 100" class="edge"/>

  <!-- 判断1 -> 创建核心线程 (是) -->
  <path d="M 520 135 L 580 135" class="edge"/>
  <text x="550" y="128" class="edge-text">是</text>

  <!-- 判断1 -> 判断2 (否) -->
  <path d="M 400 170 L 400 210" class="edge"/>
  <text x="415" y="190" class="edge-text">否</text>

  <!-- 判断2 -> 放入队列 (是) -->
  <path d="M 520 245 L 580 245" class="edge"/>
  <text x="550" y="238" class="edge-text">是</text>

  <!-- 判断2 -> 判断3 (否) -->
  <path d="M 400 280 L 400 320" class="edge"/>
  <text x="415" y="300" class="edge-text">否</text>

  <!-- 判断3 -> 创建非核心线程 (是) -->
  <path d="M 520 355 L 580 355" class="edge"/>
  <text x="550" y="348" class="edge-text">是</text>

  <!-- 判断3 -> 拒绝策略 (否) -->
  <path d="M 400 390 L 400 430" class="edge"/>
  <text x="415" y="410" class="edge-text">否</text>
</svg>