<!-- Promise 状态转换图 -->
<svg width="480" height="320" viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="480" height="320" fill="#ffffff" rx="8"/>

  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- pending 状态 -->
  <ellipse cx="240" cy="60" rx="70" ry="34" fill="#fbbf24" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="57" text-anchor="middle" font-size="15" font-family="system-ui, sans-serif" font-weight="600" fill="#78350f">pending</text>
  <text x="240" y="74" text-anchor="middle" font-size="11" font-family="system-ui, sans-serif" fill="#92400e">进行中</text>

  <!-- fulfilled 状态 -->
  <ellipse cx="390" cy="230" rx="70" ry="34" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="227" text-anchor="middle" font-size="15" font-family="system-ui, sans-serif" font-weight="600" fill="#14532d">fulfilled</text>
  <text x="390" y="244" text-anchor="middle" font-size="11" font-family="system-ui, sans-serif" fill="#166534">已成功</text>

  <!-- rejected 状态 -->
  <ellipse cx="90" cy="230" rx="70" ry="34" fill="#fecaca" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="227" text-anchor="middle" font-size="15" font-family="system-ui, sans-serif" font-weight="600" fill="#7f1d1d">rejected</text>
  <text x="90" y="244" text-anchor="middle" font-size="11" font-family="system-ui, sans-serif" fill="#991b1b">已失败</text>

  <!-- 箭头：pending -> fulfilled -->
  <path d="M 280 80 C 320 80, 340 140, 350 195" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="320" y="125" font-size="12" font-family="system-ui, sans-serif" fill="#16a34a" font-weight="500">resolve(value)</text>

  <!-- 箭头：pending -> rejected -->
  <path d="M 200 80 C 160 80, 140 140, 130 195" fill="none" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="140" y="125" font-size="12" font-family="system-ui, sans-serif" fill="#dc2626" font-weight="500">reject(reason)</text>
</svg>
