<svg viewBox="0 0 600 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box-label { font-size: 16px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .margin-label { fill: #ff6b6b; }
      .border-label { fill: #4ecdc4; }
      .padding-label { fill: #45b7d1; }
      .content-label { fill: #2c3e50; }
      .content-fill { fill: #e8f4f8; }
      .arrow-line { stroke: #999; stroke-width: 1; stroke-dasharray: 3,3; }
      .dimension-text { font-size: 12px; fill: #666; font-family: monospace; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="600" height="550" fill="#fafafa"/>

  <!-- Margin 区域（虚线） -->
  <rect x="30" y="30" width="540" height="440" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="6,4" rx="2"/>
  <text x="50" y="55" class="box-label margin-label">Margin</text>

  <!-- Border 区域（实线） -->
  <rect x="80" y="90" width="440" height="360" fill="none" stroke="#4ecdc4" stroke-width="4" rx="2"/>
  <text x="100" y="115" class="box-label border-label">Border</text>

  <!-- Padding 区域 -->
  <rect x="130" y="150" width="340" height="240" fill="none" stroke="#45b7d1" stroke-width="2" stroke-dasharray="4,2" rx="2"/>
  <text x="150" y="175" class="box-label padding-label">Padding</text>

  <!-- Content 区域 -->
  <rect x="180" y="210" width="240" height="120" class="content-fill" stroke="#2c3e50" stroke-width="2" rx="2"/>
  <text x="300" y="275" class="box-label content-label" text-anchor="middle">Content</text>

  <!-- Legend -->
  <g transform="translate(30, 500)">
    <text x="0" y="0" class="box-label" style="font-size: 14px; fill: #2c3e50;">盒子模型组成：</text>
    <rect x="0" y="10" width="8" height="8" fill="#e8f4f8" stroke="#2c3e50" stroke-width="1"/>
    <text x="15" y="17" class="dimension-text">Content</text>

    <rect x="80" y="10" width="8" height="8" fill="none" stroke="#45b7d1" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="95" y="17" class="dimension-text">Padding</text>

    <rect x="160" y="10" width="8" height="8" fill="none" stroke="#4ecdc4" stroke-width="2"/>
    <text x="175" y="17" class="dimension-text">Border</text>

    <rect x="230" y="10" width="8" height="8" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="245" y="17" class="dimension-text">Margin</text>
  </g>
</svg>
