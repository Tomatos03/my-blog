<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#999999"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="500" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="600" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Python 异常层次结构</text>

  <!-- 第0层：根节点 BaseException -->
  <g>
    <rect x="500" y="50" width="200" height="50" rx="8" fill="#333333" stroke="#333333" stroke-width="2" filter="url(#shadow)"/>
    <text x="600" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">BaseException</text>
  </g>

  <!-- 连接线到第1层 -->
  <line x1="600" y1="100" x2="600" y2="130" stroke="#999999" stroke-width="2"/>

  <!-- 第1层：4个主分支 (均匀分布，间距20px) -->
  <!-- SystemExit -->
  <g>
    <line x1="600" y1="130" x2="270" y2="160" stroke="#999999" stroke-width="2"/>
    <rect x="170" y="160" width="200" height="50" rx="8" fill="#3498db" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="270" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">SystemExit</text>
  </g>

  <!-- KeyboardInterrupt -->
  <g>
    <line x1="600" y1="130" x2="490" y2="160" stroke="#999999" stroke-width="2"/>
    <rect x="390" y="160" width="200" height="50" rx="8" fill="#3498db" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="490" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">KeyboardInterrupt</text>
  </g>

  <!-- GeneratorExit -->
  <g>
    <line x1="600" y1="130" x2="710" y2="160" stroke="#999999" stroke-width="2"/>
    <rect x="610" y="160" width="200" height="50" rx="8" fill="#3498db" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="710" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">GeneratorExit</text>
  </g>

  <!-- Exception (突出显示) -->
  <g>
    <line x1="600" y1="130" x2="930" y2="160" stroke="#999999" stroke-width="2"/>
    <rect x="830" y="160" width="200" height="50" rx="8" fill="#2ecc71" stroke="#2ecc71" stroke-width="2" filter="url(#shadow)"/>
    <text x="930" y="192" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Exception</text>
  </g>

  <!-- 连接线从Exception到第2层 -->
  <line x1="930" y1="210" x2="930" y2="240" stroke="#999999" stroke-width="2"/>

  <!-- 第2层：Exception的主要子异常 (均匀分布，间距20px) -->
  <!-- TypeError -->
  <g>
    <line x1="930" y1="240" x2="160" y2="270" stroke="#999999" stroke-width="2"/>
    <rect x="60" y="270" width="200" height="50" rx="8" fill="#e67e22" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="160" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">TypeError</text>
  </g>

  <!-- ValueError -->
  <g>
    <line x1="930" y1="240" x2="380" y2="270" stroke="#999999" stroke-width="2"/>
    <rect x="280" y="270" width="200" height="50" rx="8" fill="#e67e22" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="380" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">ValueError</text>
  </g>

  <!-- ArithmeticError -->
  <g>
    <line x1="930" y1="240" x2="600" y2="270" stroke="#999999" stroke-width="2"/>
    <rect x="500" y="270" width="200" height="50" rx="8" fill="#e67e22" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="600" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">ArithmeticError</text>
  </g>

  <!-- LookupError -->
  <g>
    <line x1="930" y1="240" x2="820" y2="270" stroke="#999999" stroke-width="2"/>
    <rect x="720" y="270" width="200" height="50" rx="8" fill="#e67e22" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">LookupError</text>
  </g>

  <!-- OSError -->
  <g>
    <line x1="930" y1="240" x2="1040" y2="270" stroke="#999999" stroke-width="2"/>
    <rect x="940" y="270" width="200" height="50" rx="8" fill="#e67e22" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="1040" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">OSError</text>
  </g>

  <!-- 第3层：具体异常类型 -->
  <!-- ZeroDivisionError (from ArithmeticError) -->
  <g>
    <line x1="600" y1="320" x2="150" y2="350" stroke="#999999" stroke-width="2"/>
    <rect x="50" y="350" width="200" height="45" rx="8" fill="#9b59b6" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="380" text-anchor="middle" font-size="11" fill="#ffffff">ZeroDivisionError</text>
  </g>

  <!-- OverflowError (from ArithmeticError) -->
  <g>
    <line x1="600" y1="320" x2="370" y2="350" stroke="#999999" stroke-width="2"/>
    <rect x="270" y="350" width="200" height="45" rx="8" fill="#9b59b6" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="370" y="380" text-anchor="middle" font-size="11" fill="#ffffff">OverflowError</text>
  </g>

  <!-- IndexError (from LookupError) -->
  <g>
    <line x1="820" y1="320" x2="590" y2="350" stroke="#999999" stroke-width="2"/>
    <rect x="490" y="350" width="200" height="45" rx="8" fill="#9b59b6" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="590" y="380" text-anchor="middle" font-size="11" fill="#ffffff">IndexError</text>
  </g>

  <!-- KeyError (from LookupError) -->
  <g>
    <line x1="820" y1="320" x2="810" y2="350" stroke="#999999" stroke-width="2"/>
    <rect x="710" y="350" width="200" height="45" rx="8" fill="#9b59b6" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="810" y="380" text-anchor="middle" font-size="11" fill="#ffffff">KeyError</text>
  </g>

  <!-- FileNotFoundError (from OSError) -->
  <g>
    <line x1="1040" y1="320" x2="1030" y2="350" stroke="#999999" stroke-width="2"/>
    <rect x="930" y="350" width="200" height="45" rx="8" fill="#9b59b6" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="1030" y="380" text-anchor="middle" font-size="11" fill="#ffffff">FileNotFoundError</text>
  </g>
</svg>