<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <style>
      .title { font-size: 16px; font-weight: bold; fill: #333333; }
      .label { font-size: 12px; font-weight: bold; }
      .positive-index { fill: #3498db; }
      .negative-index { fill: #e67e22; }
      .element-text { font-size: 14px; font-weight: bold; fill: #ffffff; }
    </style>
  </defs>

  <!-- 白色背景 -->
  <rect width="800" height="280" fill="#ffffff"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" class="title">Python 列表索引</text>

  <!-- 正索引标签 -->
  <text x="205" y="65" class="label positive-index">正索引:</text>

  <!-- 正索引 -->
  <g id="positive-indices">
    <text x="245" y="85" text-anchor="middle" class="label positive-index">0</text>
    <text x="325" y="85" text-anchor="middle" class="label positive-index">1</text>
    <text x="405" y="85" text-anchor="middle" class="label positive-index">2</text>
    <text x="485" y="85" text-anchor="middle" class="label positive-index">3</text>
    <text x="565" y="85" text-anchor="middle" class="label positive-index">4</text>
  </g>

  <!-- 列表元素 -->
  <g id="list-elements">
    <rect x="215" y="105" width="60" height="60" rx="6" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
    <text x="245" y="140" text-anchor="middle" class="element-text">10</text>

    <rect x="295" y="105" width="60" height="60" rx="6" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
    <text x="325" y="140" text-anchor="middle" class="element-text">20</text>

    <rect x="375" y="105" width="60" height="60" rx="6" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
    <text x="405" y="140" text-anchor="middle" class="element-text">30</text>

    <rect x="455" y="105" width="60" height="60" rx="6" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
    <text x="485" y="140" text-anchor="middle" class="element-text">40</text>

    <rect x="535" y="105" width="60" height="60" rx="6" fill="#3498db" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
    <text x="565" y="140" text-anchor="middle" class="element-text">50</text>
  </g>

  <!-- 负索引标签 -->
  <text x="205" y="210" class="label negative-index">负索引:</text>

  <!-- 负索引 -->
  <g id="negative-indices">
    <text x="245" y="230" text-anchor="middle" class="label negative-index">-5</text>
    <text x="325" y="230" text-anchor="middle" class="label negative-index">-4</text>
    <text x="405" y="230" text-anchor="middle" class="label negative-index">-3</text>
    <text x="485" y="230" text-anchor="middle" class="label negative-index">-2</text>
    <text x="565" y="230" text-anchor="middle" class="label negative-index">-1</text>
  </g>
</svg>