<!-- 事件循环执行模型图 -->
<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="600" height="280" fill="#f8f9fa" rx="8"/>

  <!-- 标题 -->
  <text x="300" y="30" text-anchor="middle" font-size="18" font-family="system-ui" font-weight="bold">JavaScript 事件循环执行模型</text>

  <!-- Call Stack -->
  <rect x="30" y="60" width="160" height="200" fill="#ffffff" stroke="#333" stroke-width="2" rx="4"/>
  <text x="110" y="85" text-anchor="middle" font-size="14" font-family="system-ui" font-weight="bold">Call Stack</text>
  <text x="110" y="105" text-anchor="middle" font-size="10" font-family="system-ui" fill="#666">调用栈</text>
  <line x1="40" y1="210" x2="180" y2="210" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="110" y="200" text-anchor="middle" font-size="10" font-family="system-ui" fill="#666">函数B</text>
  <line x1="40" y1="170" x2="180" y2="170" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="110" y="160" text-anchor="middle" font-size="10" font-family="system-ui" fill="#666">函数A</text>
  <line x1="40" y1="130" x2="180" y2="130" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="110" y="120" text-anchor="middle" font-size="10" font-family="system-ui" fill="#666">main()</text>
  <text x="110" y="252" text-anchor="middle" font-size="9" font-family="system-ui" fill="#999">← 同步代码执行</text>

  <!-- 箭头: Call Stack → Microtask -->
  <path d="M 195 120 L 215 120" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Microtask Queue -->
  <rect x="220" y="60" width="160" height="100" fill="#d4edda" stroke="#28a745" stroke-width="2" rx="4"/>
  <text x="300" y="85" text-anchor="middle" font-size="13" font-family="system-ui" font-weight="bold">Microtask</text>
  <text x="300" y="100" text-anchor="middle" font-size="10" font-family="system-ui" fill="#666">微任务队列</text>
  <rect x="230" y="115" width="140" height="26" fill="#28a745" rx="3"/>
  <text x="300" y="133" text-anchor="middle" font-size="10" font-family="system-ui" fill="white">Promise.then()</text>
  <rect x="230" y="146" width="140" height="26" fill="#28a745" rx="3"/>
  <text x="300" y="164" text-anchor="middle" font-size="10" font-family="system-ui" fill="white">queueMicrotask()</text>

  <!-- 箭头: Microtask → Macrotask -->
  <path d="M 385 120 L 405 120" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Macrotask Queue -->
  <rect x="410" y="60" width="160" height="100" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="4"/>
  <text x="490" y="85" text-anchor="middle" font-size="13" font-family="system-ui" font-weight="bold">Macrotask</text>
  <text x="490" y="100" text-anchor="middle" font-size="10" font-family="system-ui" fill="#666">宏任务队列</text>
  <rect x="420" y="115" width="140" height="26" fill="#ffc107" rx="3"/>
  <text x="490" y="133" text-anchor="middle" font-size="10" font-family="system-ui" fill="#333">setTimeout()</text>
  <rect x="420" y="146" width="140" height="26" fill="#ffc107" rx="3"/>
  <text x="490" y="164" text-anchor="middle" font-size="10" font-family="system-ui" fill="#333">setInterval()</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
</svg>