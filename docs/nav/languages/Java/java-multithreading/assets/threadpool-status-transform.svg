<svg width="950" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义样式 -->
  <defs>
    <style>
      .node { fill: #e1f5fe; stroke: #0288d1; stroke-width: 2; }
      .node-text { font-family: "Microsoft YaHei", Arial; font-size: 14px; font-weight: bold; fill: #01579b; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #4caf50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .edge-text { font-family: "Microsoft YaHei", Arial; font-size: 12px; fill: #2e7d32; text-anchor: middle; }
      .arrowhead { fill: #4caf50; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrowhead"/>
    </marker>
  </defs>

  <!-- 节点定义 -->
  <!-- RUNNING 节点 -->
  <rect x="50" y="170" width="120" height="60" rx="10" class="node"/>
  <text x="110" y="200" class="node-text">RUNNING</text>

  <!-- SHUTDOWN 节点 -->
  <rect x="320" y="80" width="120" height="60" rx="10" class="node"/>
  <text x="380" y="110" class="node-text">SHUTDOWN</text>

  <!-- STOP 节点 -->
  <rect x="320" y="260" width="120" height="60" rx="10" class="node"/>
  <text x="380" y="290" class="node-text">STOP</text>

  <!-- TIDYING 节点 -->
  <rect x="590" y="170" width="120" height="60" rx="10" class="node"/>
  <text x="650" y="200" class="node-text">TIDYING</text>

  <!-- TERMINATED 节点 -->
  <rect x="830" y="170" width="120" height="60" rx="10" class="node"/>
  <text x="890" y="200" class="node-text">TERMINATED</text>

  <!-- 边和标注 -->
  <!-- RUNNING -> SHUTDOWN -->
  <path d="M 170 190 Q 245 190 245 110 L 320 110" class="edge"/>
  <text x="245" y="100" class="edge-text">shutdown()</text>

  <!-- RUNNING -> STOP -->
  <path d="M 170 210 Q 245 210 245 290 L 320 290" class="edge"/>
  <text x="245" y="310" class="edge-text">shutdownNow()</text>

  <!-- SHUTDOWN -> TIDYING -->
  <path d="M 440 110 Q 515 110 515 190 L 590 190" class="edge"/>
  <text x="535" y="140" class="edge-text">队列为空且线程数为0</text>

  <!-- STOP -> TIDYING -->
  <path d="M 440 290 Q 515 290 515 210 L 590 210" class="edge"/>
  <text x="515" y="260" class="edge-text">线程数为0</text>

  <!-- TIDYING -> TERMINATED -->
  <path d="M 710 200 L 830 200" class="edge"/>
  <text x="770" y="190" class="edge-text">terminated()执行完毕</text>

  <!-- SHUTDOWN -> STOP (Indirectly possible via shutdownNow() after shutdown()) -->
  <path d="M 380 140 L 380 260" class="edge" stroke-dasharray="5,5"/>
  <text x="425" y="205" class="edge-text">shutdownNow()</text>
</svg>