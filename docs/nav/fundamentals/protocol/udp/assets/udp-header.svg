<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <style>
    text { font-family: monospace; font-size: 13px; }
  </style>

  <!-- 白色背景 -->
  <rect x="0" y="0" width="400" height="220" fill="white"/>

  <text x="200" y="20" text-anchor="middle" font-weight="bold">UDP 数据报结构</text>

  <!-- 源端口 -->
  <rect x="20" y="35" width="170" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="105" y="58" text-anchor="middle">源端口 (Source Port)</text>
  <text x="105" y="75" text-anchor="middle" font-size="11px">16 bit</text>

  <!-- 目标端口 -->
  <rect x="190" y="35" width="170" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="275" y="58" text-anchor="middle">目标端口 (Dest Port)</text>
  <text x="275" y="75" text-anchor="middle" font-size="11px">16 bit</text>

  <!-- 长度 -->
  <rect x="20" y="85" width="170" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="105" y="108" text-anchor="middle">长度 (Length)</text>
  <text x="105" y="125" text-anchor="middle" font-size="11px">16 bit</text>

  <!-- 校验和 -->
  <rect x="190" y="85" width="170" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="275" y="108" text-anchor="middle">校验和 (Checksum)</text>
  <text x="275" y="125" text-anchor="middle" font-size="11px">16 bit</text>

  <!-- 分隔 -->
  <line x1="20" y1="142" x2="360" y2="142" stroke="black" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="190" y="156" text-anchor="middle" font-size="11px">◀── 头部固定 8 字节 ──▶</text>

  <!-- 数据 -->
  <rect x="20" y="165" width="340" height="40" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="190" y="188" text-anchor="middle">数据 (Payload) — 可变长度</text>

  <!-- 位标尺 -->
  <text x="20" y="215" font-size="10px">0</text>
  <text x="105" y="215" text-anchor="middle" font-size="10px">15</text>
  <text x="190" y="215" text-anchor="middle" font-size="10px">16</text>
  <text x="275" y="215" text-anchor="middle" font-size="10px">31</text>
  <text x="360" y="215" text-anchor="end" font-size="10px">63</text>
</svg>
