>- Access-Control-Request-Method</text><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="239.5107" x="590.3087" y="286.5576">- Access-Control-Request-Headers</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" data-source-line="21" id="msg4"><polygon fill="#191919" points="594.3087,399.6406,584.3087,403.6406,594.3087,407.6406,590.3087,403.6406" style="stroke:#191919;stroke-width:1;"/><line style="stroke:#191919;stroke-width:1;stroke-dasharray:2,2;" x1="588.3087" x2="858.3433" y1="403.6406" y2="403.6406"/><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="83.9996" x="600.3087" y="316.8545">返回预检结果</text><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="203.4307" x="600.3087" y="333.1514">- Access-Control-Allow-Origin</text><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="220.917" x="600.3087" y="349.4482">- Access-Control-Allow-Methods</text><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="219.3857" x="600.3087" y="365.7451">- Access-Control-Allow-Headers</text><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="240.7754" x="600.3087" y="382.042">- Access-Control-Allow-Credentials</text><text fill="#000000" font-family="'Microsoft YaHei'" font-size="14" lengthAdjust="spacing" textLength="179.7646" x="600.3087" y="398.3389">- Access-Control-Max-Age</text></g><path d="M287.5,418.6406 L349.9385,418.6406 L349.9385,426.9375 L339.9385,436.9375 L284,436.9375 L284,422.1406 A3.5,3.5 0 0 1 287.5,418.6406" fill="#EEEEEE" style="stroke:#393939;stroke-width:1.5;"/><rect fill="none" height="131.0781" rx="3.5" ry="3.5" style="stroke:#393939;stroke-width:1;" width="620.3431" x="284" y="418.6406"/><text fill="#191919" font-family="'Microsoft YaHei'" fon