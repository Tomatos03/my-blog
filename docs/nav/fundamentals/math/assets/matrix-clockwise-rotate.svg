  <text x="218" y="98" text-anchor="middle" class="dim">5 × 6</text>
  <text x="598" y="80" text-anchor="middle" class="section">转置</text>
  <text x="598" y="98" text-anchor="middle" class="dim">6 × 5</text>
  <text x="978" y="80" text-anchor="middle" class="section">最终结果</text>
  <text x="978" y="98" text-anchor="middle" class="dim">6 × 5</text>

  <!-- Original matrix: 5×6, centered at x=218 -->
