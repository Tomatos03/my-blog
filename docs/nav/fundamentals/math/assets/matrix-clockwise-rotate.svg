    <use href="#o-r1" transform="translate(0, 44)"/>
    <use href="#o-r2" transform="translate(0, 88)"/>
    <use href="#o-r3" transform="translate(0, 132)"/>
    <use href="#o-r4" transform="translate(0, 176)"/>
  </g>

  <!-- Arrow 1: original(382) → transposed(462), circle above -->
  <line x1="382" y1="244" x2="462" y2="244" stroke="#3498db" stroke-width="2" marker-end="url(#arr-b)"/>
  <circle cx="422" cy="210" r="15" fill="#3498db"/>
  <text x="422" y="210" class="step-num">1</text>
  <text x="422" y="188" text-anchor="middle" class="step-label">转置</text>

  <!-- Transposed matrix: 6×5, centered at x=598 -->
