    <use href="#t-r0" transform="translate(0, 0)"/>
    <use href="#t-r1" transform="translate(0, 44)"/>
    <use href="#t-r2" transform="translate(0, 88)"/>
    <use href="#t-r3" transform="translate(0, 132)"/>
    <use href="#t-r4" transform="translate(0, 176)"/>
    <use href="#t-r5" transform="translate(0, 220)"/>
  </g>

  <!-- Arrow 2: transposed(742) → final(838), circle above -->
  <line x1="742" y1="244" x2="838" y2="244" stroke="#9b59b6" stroke-width="2" marker-end="url(#arr-p)"/>
  <circle cx="790" cy="210" r="15" fill="#9b59b6"/>
  <text x="790" y="210" class="step-num">2</text>
  <text x="790" y="188" text-anchor="middle" class="step-label">水平翻转列</text>

  <!-- Final rotated matrix: 6×5, centered at x=978 -->
  <g transform="translate(838, 112)">
    <use href="#f-r0" transform="translate(0, 0)"/>
    <use href="#f-r1" transform="translate(0, 44)"/>
    <use href="#f-r2" transform="translate(0, 88)"/>
    <use href="#f-r3" transform="translate(0, 132)"/>
    <use href="#f-r4" transform="translate(0, 176)"/>
    <use href="#f-r5" transform="translate(0, 220)"/>
  </g>

  <!-- Formula -->
  <text x="600" y="420" text-anchor="middle" class="formula">
    顺时针旋转 90° = 转置 + 水平翻转列
  </text>
  <text x="600" y="445" text-anchor="middle" class="formula-mono">
    B[i][j] = A[j][n-1-i] ，其中 n 为原矩阵行数
  </text>
