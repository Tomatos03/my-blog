<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="760" viewBox="-83 10.5 2400 760" role="img" aria-labelledby="title desc">
  <title id="title">Matrix clockwise rotation diagram with separated steps</title>
  <desc id="desc">A matrix rotated clockwise by 90 degrees, showing the original matrix, the transposed intermediate matrix, and the final rotated matrix with enough spacing between them.</desc>
  <defs>
    <style>
      .sub { font: 32px sans-serif; fill: #374151; }
      .section { font: 38px sans-serif; font-weight: 700; fill: #1f2937; }
      .coord { font: 30px monospace; fill: #111827; }
      .cell { fill: #ffffff; stroke: #334155; stroke-width: 3; }
      .cell-a { fill: #e0f2fe; stroke: #334155; stroke-width: 3; }
      .arrow { stroke: #2563eb; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #7c3aed; stroke-width: 5; fill: none; marker-end: url(#arrowhead2); }
      .step { font: 34px sans-serif; font-weight: 700; fill: #0f172a; }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowhead2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <text x="60" y="60" class="sub">过程：原矩阵 → 沿主对角线翻转 → 再从左到右翻转 </text>

