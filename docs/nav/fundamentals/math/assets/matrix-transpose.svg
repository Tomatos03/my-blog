<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1280 580"
     width="1280"
     height="580"
     role="img"
     aria-labelledby="title desc">
  <title id="title">矩阵转置示意图</title>
  <desc id="desc">左侧 5×6 原矩阵通过转置变为右侧 6×5 转置矩阵，原行变列、原列变行</desc>

  <defs>
    <style>
      .title       { font: 600 26px "Microsoft YaHei","PingFang SC",sans-serif; fill: #0f172a; }
      .subtitle    { font: 18px "Microsoft YaHei","PingFang SC",sans-serif; fill: #475569; }
      .matrix-label{ font: 500 18px "Microsoft YaHei","PingFang SC",sans-serif; fill: #334155; }
      .cell-text   { font: 18px "Courier New","Noto Sans Mono",monospace; fill: #1e293b; text-anchor: middle; dominant-baseline: central; }
      .cell-text-em{ font: 700 18px "Courier New","Noto Sans Mono",monospace; fill: #4338ca; text-anchor: middle; dominant-baseline: central; }
      .axis-label  { font: 14px "Microsoft YaHei","PingFang SC",sans-serif; fill: #64748b; text-anchor: middle; }
      .axis-label-l{ font: 14px "Microsoft YaHei","PingFang SC",sans-serif; fill: #64748b; text-anchor: end; dominant-baseline: central; }
      .cell        { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 4; }
      .cell-alt    { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1.5; rx: 4; }
      .cell-hl     { fill: #eef2ff; stroke: #818cf8; stroke-width: 2; rx: 4; }
    </style>

    <style>
      .trans-arrow { stroke: #6366f1; stroke-width: 3; fill: none; marker-end: url(#arrow-head); }
      .conn-arrow  { stroke: #a5b4fc; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#conn-head); }
    </style>

    <marker id="arrow-head"
            markerWidth="12" markerHeight="12"
            refX="10" refY="6"
            orient="auto">
      <path d="M0 0 L12 6 L0 12 z" fill="#6366f1"/>
    </marker>

    <marker id="conn-head"
            markerWidth="8" markerHeight="8"
            refX="6.5" refY="4"
            orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#a5b4fc"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!--  背景层                                                       -->
  <!-- ============================================================ -->

  <!-- ============================================================ -->
  <!--  主体层：矩阵单元格                                          -->
  <!-- ============================================================ -->

  <!-- ======== 左矩阵：5 行 × 6 列，起始 (100, 155)，单元格 84×50 ======== -->

  <!-- 第1行（高亮） -->
  <rect x="100" y="155" width="84" height="50" class="cell-hl"/>
  <rect x="184" y="155" width="84" height="50" class="cell-hl"/>
  <rect x="268" y="155" width="84" height="50" class="cell-hl"/>
  <rect x="352" y="155" width="84" height="50" class="cell-hl"/>
  <rect x="436" y="155" width="84" height="50" class="cell-hl"/>
  <rect x="520" y="155" width="84" height="50" class="cell-hl"/>

  <!-- 第2行 -->
  <rect x="100" y="205" width="84" height="50" class="cell"/>
  <rect x="184" y="205" width="84" height="50" class="cell-alt"/>
  <rect x="268" y="205" width="84" height="50" class="cell"/>
  <rect x="352" y="205" width="84" height="50" class="cell-alt"/>
  <rect x="436" y="205" width="84" height="50" class="cell"/>
  <rect x="520" y="205" width="84" height="50" class="cell-alt"/>

  <!-- 第3行 -->
  <rect x="100" y="255" width="84" height="50" class="cell-alt"/>
  <rect x="184" y="255" width="84" height="50" class="cell"/>
  <rect x="268" y="255" width="84" height="50" class="cell-alt"/>
  <rect x="352" y="255" width="84" height="50" class="cell"/>
  <rect x="436" y="255" width="84" height="50" class="cell-alt"/>
  <rect x="520" y="255" width="84" height="50" class="cell"/>

  <!-- 第4行 -->
  <rect x="100" y="305" width="84" height="50" class="cell"/>
  <rect x="184" y="305" width="84" height="50" class="cell-alt"/>
  <rect x="268" y="305" width="84" height="50" class="cell"/>
  <rect x="352" y="305" width="84" height="50" class="cell-alt"/>
  <rect x="436" y="305" width="84" height="50" class="cell"/>
  <rect x="520" y="305" width="84" height="50" class="cell-alt"/>

  <!-- 第5行 -->
  <rect x="100" y="355" width="84" height="50" class="cell-alt"/>
  <rect x="184" y="355" width="84" height="50" class="cell"/>
  <rect x="268" y="355" width="84" height="50" class="cell-alt"/>
  <rect x="352" y="355" width="84" height="50" class="cell"/>
  <rect x="436" y="355" width="84" height="50" class="cell-alt"/>
  <rect x="520" y="355" width="84" height="50" class="cell"/>

  <!-- ======== 右矩阵：6 行 × 5 列，起始 (740, 155)，单元格 84×50 ======== -->

  <!-- 第1列（高亮 —— 原第1行转置而来） -->
  <rect x="740" y="155" width="84" height="50" class="cell-hl"/>
  <rect x="740" y="205" width="84" height="50" class="cell-hl"/>
  <rect x="740" y="255" width="84" height="50" class="cell-hl"/>
  <rect x="740" y="305" width="84" height="50" class="cell-hl"/>
  <rect x="740" y="355" width="84" height="50" class="cell-hl"/>
  <rect x="740" y="405" width="84" height="50" class="cell-hl"/>

  <!-- 第2列 -->
  <rect x="824" y="155" width="84" height="50" class="cell"/>
  <rect x="824" y="205" width="84" height="50" class="cell-alt"/>
  <rect x="824" y="255" width="84" height="50" class="cell"/>
  <rect x="824" y="305" width="84" height="50" class="cell-alt"/>
  <rect x="824" y="355" width="84" height="50" class="cell"/>
  <rect x="824" y="405" width="84" height="50" class="cell-alt"/>

  <!-- 第3列 -->
  <rect x="908" y="155" width="84" height="50" class="cell-alt"/>
  <rect x="908" y="205" width="84" height="50" class="cell"/>
  <rect x="908" y="255" width="84" height="50" class="cell-alt"/>
  <rect x="908" y="305" width="84" height="50" class="cell"/>
  <rect x="908" y="355" width="84" height="50" class="cell-alt"/>
  <rect x="908" y="405" width="84" height="50" class="cell"/>

  <!-- 第4列 -->
  <rect x="992" y="155" width="84" height="50" class="cell"/>
  <rect x="992" y="205" width="84" height="50" class="cell-alt"/>
  <rect x="992" y="255" width="84" height="50" class="cell"/>
  <rect x="992" y="305" width="84" height="50" class="cell-alt"/>
  <rect x="992" y="355" width="84" height="50" class="cell"/>
  <rect x="992" y="405" width="84" height="50" class="cell-alt"/>

  <!-- 第5列 -->
  <rect x="1076" y="155" width="84" height="50" class="cell-alt"/>
  <rect x="1076" y="205" width="84" height="50" class="cell"/>
  <rect x="1076" y="255" width="84" height="50" class="cell-alt"/>
  <rect x="1076" y="305" width="84" height="50" class="cell"/>
  <rect x="1076" y="355" width="84" height="50" class="cell-alt"/>
  <rect x="1076" y="405" width="84" height="50" class="cell"/>

  <!-- ============================================================ -->
  <!--  连线层：箭头、引线、连接器                                   -->
  <!-- ============================================================ -->

  <!-- 第1行 → 第1列 转置关系连线 -->
  <path d="M 604 180 Q 672 168 740 180" class="conn-arrow"/>

  <!-- 中央转置箭头 -->
  <path d="M 616 305 L 728 305" class="trans-arrow"/>

  <!-- ============================================================ -->
  <!--  文字层：最顶层                                               -->
  <!-- ============================================================ -->

  <!-- ===== 标题区 ===== -->
  <text x="640" y="38"  class="title"      text-anchor="middle">矩阵转置示意图</text>
  <text x="640" y="68"  class="subtitle"   text-anchor="middle">原矩阵的行变为转置矩阵的列，原矩阵的列变为转置矩阵的行</text>

  <!-- ===== 矩阵标签 ===== -->
  <text x="352" y="105" class="matrix-label" text-anchor="middle">原矩阵 A (5×6)</text>
  <text x="930" y="105" class="matrix-label" text-anchor="middle">转置矩阵 Aᵀ (6×5)</text>

  <!-- ===== 左矩阵列标 ===== -->
  <text x="142" y="143" class="axis-label">列₁</text>
  <text x="226" y="143" class="axis-label">列₂</text>
  <text x="310" y="143" class="axis-label">列₃</text>
  <text x="394" y="143" class="axis-label">列₄</text>
  <text x="478" y="143" class="axis-label">列₅</text>
  <text x="562" y="143" class="axis-label">列₆</text>

  <!-- ===== 左矩阵行标 ===== -->
  <text x="86" y="180" class="axis-label-l">行₁</text>
  <text x="86" y="230" class="axis-label-l">行₂</text>
  <text x="86" y="280" class="axis-label-l">行₃</text>
  <text x="86" y="330" class="axis-label-l">行₄</text>
  <text x="86" y="380" class="axis-label-l">行₅</text>

  <!-- ===== 左矩阵单元格文字 ===== -->
  <!-- 第1行 -->
  <text x="142" y="180" class="cell-text-em">a₁₁</text>
  <text x="226" y="180" class="cell-text-em">a₁₂</text>
  <text x="310" y="180" class="cell-text-em">a₁₃</text>
  <text x="394" y="180" class="cell-text-em">a₁₄</text>
  <text x="478" y="180" class="cell-text-em">a₁₅</text>
  <text x="562" y="180" class="cell-text-em">a₁₆</text>

  <!-- 第2行 -->
  <text x="142" y="230" class="cell-text">a₂₁</text>
  <text x="226" y="230" class="cell-text">a₂₂</text>
  <text x="310" y="230" class="cell-text">a₂₃</text>
  <text x="394" y="230" class="cell-text">a₂₄</text>
  <text x="478" y="230" class="cell-text">a₂₅</text>
  <text x="562" y="230" class="cell-text">a₂₆</text>

  <!-- 第3行 -->
  <text x="142" y="280" class="cell-text">a₃₁</text>
  <text x="226" y="280" class="cell-text">a₃₂</text>
  <text x="310" y="280" class="cell-text">a₃₃</text>
  <text x="394" y="280" class="cell-text">a₃₄</text>
  <text x="478" y="280" class="cell-text">a₃₅</text>
  <text x="562" y="280" class="cell-text">a₃₆</text>

  <!-- 第4行 -->
  <text x="142" y="330" class="cell-text">a₄₁</text>
  <text x="226" y="330" class="cell-text">a₄₂</text>
  <text x="310" y="330" class="cell-text">a₄₃</text>
  <text x="394" y="330" class="cell-text">a₄₄</text>
  <text x="478" y="330" class="cell-text">a₄₅</text>
  <text x="562" y="330" class="cell-text">a₄₆</text>

  <!-- 第5行 -->
  <text x="142" y="380" class="cell-text">a₅₁</text>
  <text x="226" y="380" class="cell-text">a₅₂</text>
  <text x="310" y="380" class="cell-text">a₅₃</text>
  <text x="394" y="380" class="cell-text">a₅₄</text>
  <text x="478" y="380" class="cell-text">a₅₅</text>
  <text x="562" y="380" class="cell-text">a₅₆</text>

  <!-- ===== 右矩阵列标（原行） ===== -->
  <text x="782" y="143" class="axis-label">行₁</text>
  <text x="866" y="143" class="axis-label">行₂</text>
  <text x="950" y="143" class="axis-label">行₃</text>
  <text x="1034" y="143" class="axis-label">行₄</text>
  <text x="1118" y="143" class="axis-label">行₅</text>

  <!-- ===== 右矩阵行标（原列） ===== -->
  <text x="718" y="180" class="axis-label-l">列₁</text>
  <text x="718" y="230" class="axis-label-l">列₂</text>
  <text x="718" y="280" class="axis-label-l">列₃</text>
  <text x="718" y="330" class="axis-label-l">列₄</text>
  <text x="718" y="380" class="axis-label-l">列₅</text>
  <text x="718" y="430" class="axis-label-l">列₆</text>

  <!-- ===== 右矩阵单元格文字 ===== -->
  <!-- 第1列（高亮） -->
  <text x="782" y="180" class="cell-text-em">a₁₁</text>
  <text x="782" y="230" class="cell-text-em">a₁₂</text>
  <text x="782" y="280" class="cell-text-em">a₁₃</text>
  <text x="782" y="330" class="cell-text-em">a₁₄</text>
  <text x="782" y="380" class="cell-text-em">a₁₅</text>
  <text x="782" y="430" class="cell-text-em">a₁₆</text>

  <!-- 第2列 -->
  <text x="866" y="180" class="cell-text">a₂₁</text>
  <text x="866" y="230" class="cell-text">a₂₂</text>
  <text x="866" y="280" class="cell-text">a₂₃</text>
  <text x="866" y="330" class="cell-text">a₂₄</text>
  <text x="866" y="380" class="cell-text">a₂₅</text>
  <text x="866" y="430" class="cell-text">a₂₆</text>

  <!-- 第3列 -->
  <text x="950" y="180" class="cell-text">a₃₁</text>
  <text x="950" y="230" class="cell-text">a₃₂</text>
  <text x="950" y="280" class="cell-text">a₃₃</text>
  <text x="950" y="330" class="cell-text">a₃₄</text>
  <text x="950" y="380" class="cell-text">a₃₅</text>
  <text x="950" y="430" class="cell-text">a₃₆</text>

  <!-- 第4列 -->
  <text x="1034" y="180" class="cell-text">a₄₁</text>
  <text x="1034" y="230" class="cell-text">a₄₂</text>
  <text x="1034" y="280" class="cell-text">a₄₃</text>
  <text x="1034" y="330" class="cell-text">a₄₄</text>
  <text x="1034" y="380" class="cell-text">a₄₅</text>
  <text x="1034" y="430" class="cell-text">a₄₆</text>

  <!-- 第5列 -->
  <text x="1118" y="180" class="cell-text">a₅₁</text>
  <text x="1118" y="230" class="cell-text">a₅₂</text>
  <text x="1118" y="280" class="cell-text">a₅₃</text>
  <text x="1118" y="330" class="cell-text">a₅₄</text>
  <text x="1118" y="380" class="cell-text">a₅₅</text>
  <text x="1118" y="430" class="cell-text">a₅₆</text>

  <!-- ===== 中央转置标注 ===== -->
  <text x="672" y="281" class="subtitle" text-anchor="middle" font-size="14px">转置</text>
</svg>