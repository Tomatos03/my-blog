<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="34.5 -21 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Matrix transpose diagram</title>
  <desc id="desc">A 5 by 6 matrix on the left is transposed into a 6 by 5 matrix on the right, showing rows becoming columns.</desc>
  <defs>
    <style>
      .label { font: 25px sans-serif; fill: #1f2937; }
      .cell { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .cell-light { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .sub { font: 24px sans-serif; fill: #374151; }
      .coord { font: 20px monospace; fill: #111827; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#2563eb"/>
    </marker>
  </defs>

  <text x="90" y="56" class="sub">原矩阵转置后，行列互换</text>

  <text x="371" y="96" class="label" text-anchor="middle">翻转前</text>
  <text x="991" y="96" class="label" text-anchor="middle">翻转后</text>

  <g transform="translate(90,136) scale(1.34)">
    <rect x="0" y="0" width="70" height="42" class="cell-light"/><text x="14" y="27" class="coord">(1,1)</text>
    <rect x="70" y="0" width="70" height="42" class="cell"/><text x="84" y="27" class="coord">(1,2)</text>
    <rect x="140" y="0" width="70" height="42" class="cell-light"/><text x="154" y="27" class="coord">(1,3)</text>
    <rect x="210" y="0" width="70" height="42" class="cell"/><text x="224" y="27" class="coord">(1,4)</text>
    <rect x="280" y="0" width="70" height="42" class="cell-light"/><text x="294" y="27" class="coord">(1,5)</text>
    <rect x="350" y="0" width="70" height="42" class="cell"/><text x="364" y="27" class="coord">(1,6)</text>

    <rect x="0" y="42" width="70" height="42" class="cell"/><text x="14" y="69" class="coord">(2,1)</text>
    <rect x="70" y="42" width="70" height="42" class="cell-light"/><text x="84" y="69" class="coord">(2,2)</text>
    <rect x="140" y="42" width="70" height="42" class="cell"/><text x="154" y="69" class="coord">(2,3)</text>
    <rect x="210" y="42" width="70" height="42" class="cell-light"/><text x="224" y="69" class="coord">(2,4)</text>
    <rect x="280" y="42" width="70" height="42" class="cell"/><text x="294" y="69" class="coord">(2,5)</text>
    <rect x="350" y="42" width="70" height="42" class="cell-light"/><text x="364" y="69" class="coord">(2,6)</text>

    <rect x="0" y="84" width="70" height="42" class="cell-light"/><text x="14" y="111" class="coord">(3,1)</text>
    <rect x="70" y="84" width="70" height="42" class="cell"/><text x="84" y="111" class="coord">(3,2)</text>
    <rect x="140" y="84" width="70" height="42" class="cell-light"/><text x="154" y="111" class="coord">(3,3)</text>
    <rect x="210" y="84" width="70" height="42" class="cell"/><text x="224" y="111" class="coord">(3,4)</text>
    <rect x="280" y="84" width="70" height="42" class="cell-light"/><text x="294" y="111" class="coord">(3,5)</text>
    <rect x="350" y="84" width="70" height="42" class="cell"/><text x="364" y="111" class="coord">(3,6)</text>

