<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="-25.184 -1.684 947.368 547.368" role="img" aria-labelledby="title desc">
  <title id="title">Diagonal guide for matrix</title>
  <desc id="desc">A square matrix showing the main diagonal and the anti-diagonal.</desc>
  <defs>
    <style>
      .cell { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .main { fill: #dbeafe; }
      .anti { fill: #fee2e2; }
      .label { font: 24px sans-serif; fill: #374151; }
      .coord { font: 18px monospace; fill: #111827; }
      .line-main { stroke: #2563eb; stroke-width: 5; }
      .line-anti { stroke: #dc2626; stroke-width: 5; }
      .legend { font: 21px sans-serif; fill: #111827; }
    </style>
  </defs>

  <text x="40" y="50" class="label">主对角线：左上 → 右下；副对角线：右上 → 左下</text>

  <!-- Grid -->
  <g transform="translate(110,88) scale(1.075)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="80" height="80" class="cell main"/><text x="14" y="47" class="coord">(1,1)</text>
    <rect x="80" y="0" width="80" height="80" class="cell"/><text x="94" y="47" class="coord">(1,2)</text>
    <rect x="160" y="0" width="80" height="80" class="cell"/><text x="174" y="47" class="coord">(1,3)</text>
    <rect x="240" y="0" width="80" height="80" class="cell"/><text x="254" y="47" class="coord">(1,4)</text>
    <rect x="320" y="0" width="80" height="80" class="cell anti"/><text x="334" y="47" class="coord">(1,5)</text>

    <!-- Row 2 -->
    <rect x="0" y="80" width="80" height="80" class="cell"/><text x="14" y="127" class="coord">(2,1)</text>
    <rect x="80" y="80" width="80" height="80" class="cell main"/><text x="94" y="127" class="coord">(2,2)</text>
    <rect x="160" y="80" width="80" height="80" class="cell"/><text x="174" y="127" class="coord">(2,3)</text>
    <rect x="240" y="80" width="80" height="80" class="cell anti"/><text x="254" y="127" class="coord">(2,4)</text>
    <rect x="320" y="80" width="80" height="80" class="cell"/><text x="334" y="127" class="coord">(2,5)</text>

    <!-- Row 3 -->
    <rect x="0" y="160" width="80" height="80" class="cell"/><text x="14" y="207" class="coord">(3,1)</text>
    <rect x="80" y="160" width="80" height="80" class="cell"/><text x="94" y="207" class="coord">(3,2)</text>
    <rect x="160" y="160" width="80" height="80" class="cell main"/><text x="174" y="207" class="coord">(3,3)</text>
    <rect x="240" y="160" width="80" height="80" class="cell"/><text x="254" y="207" class="coord">(3,4)</text>
    <rect x="320" y="160" width="80" height="80" class="cell"/><text x="334" y="207" class="coord">(3,5)</text>

    <!-- Row 4 -->
    <rect x="0" y="240" width="80" height="80" class="cell"/><text x="14" y="287" class="coord">(4,1)</text>
    <rect x="80" y="240" width="80" height="80" class="cell anti"/><text x="94" y="287" class="coord">(4,2)</text>
    <rect x="160" y="240" width="80" height="80" class="cell"/><text x="174" y="287" class="coord">(4,3)</text>
    <rect x="240" y="240" width="80" height="80" class="cell main"/><text x="254" y="287" class="coord">(4,4)</text>
    <rect x="320" y="240" width="80" height="80" class="cell"/><text x="334" y="287" class="coord">(4,5)</text>

    <!-- Row 5 -->
    <rect x="0" y="320" width="80" height="80" class="cell anti"/><text x="14" y="367" class="coord">(5,1)</text>
    <rect x="80" y="320" width="80" height="80" class="cell"/><text x="94" y="367" class="coord">(5,2)</text>
    <rect x="160" y="320" width="80" height="80" class="cell"/><text x="174" y="367" class="coord">(5,3)</text>
    <rect x="240" y="320" width="80" height="80" class="cell"/><text x="254" y="367" class="coord">(5,4)</text>
    <rect x="320" y="320" width="80" height="80" class="cell main"/><text x="334" y="367" class="coord">(5,5)</text>

    <!-- Diagonal lines -->
    <line x1="40" y1="40" x2="360" y2="360" class="line-main"/>
    <line x1="360" y1="40" x2="40" y2="360" class="line-anti"/>
  </g>

  <!-- Legend -->
  <g transform="translate(610,150)">
    <rect x="0" y="0" width="26" height="26" class="cell main"/>
    <text x="40" y="20" class="legend">主对角线：i = j</text>

    <rect x="0" y="48" width="26" height="26" class="cell anti"/>
    <text x="40" y="68" class="legend">副对角线：i + j = n + 1</text>

    <line x1="0" y1="120" x2="34" y2="120" class="line-main"/>
    <text x="44" y="126" class="legend">主对角线方向</text>

    <line x1="0" y1="168" x2="34" y2="168" class="line-anti"/>
    <text x="44" y="174" class="legend">副对角线方向</text>
  </g>
</svg>
