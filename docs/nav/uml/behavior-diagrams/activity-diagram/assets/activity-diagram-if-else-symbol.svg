<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .node { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .flow { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="46" class="title">条件分支符号</text>

  <rect x="90" y="186" width="190" height="54" rx="14" class="node" />
  <text x="136" y="218" class="text">提交审批单</text>

  <polygon points="350,213 400,163 450,213 400,263" class="node" />
  <text x="354" y="218" class="text">金额 &gt; 10000?</text>

  <rect x="560" y="118" width="210" height="54" rx="14" class="node" />
  <text x="610" y="150" class="text">进入经理审批</text>

  <rect x="560" y="258" width="210" height="54" rx="14" class="node" />
  <text x="626" y="290" class="text">自动通过</text>

  <polygon points="860,213 900,173 940,213 900,253" class="node" />
  <text x="886" y="218" class="text">合并</text>

  <rect x="1010" y="186" width="130" height="54" rx="14" class="node" />
  <text x="1032" y="218" class="text">通知申请人</text>

  <line x1="280" y1="213" x2="350" y2="213" class="flow" />
  <line x1="450" y1="213" x2="560" y2="145" class="flow" />
  <line x1="450" y1="213" x2="560" y2="285" class="flow" />
  <line x1="770" y1="145" x2="860" y2="213" class="flow" />
  <line x1="770" y1="285" x2="860" y2="213" class="flow" />
  <line x1="940" y1="213" x2="1010" y2="213" class="flow" />

  <text x="498" y="156" class="text">是</text>
  <text x="498" y="274" class="text">否</text>
</svg>
