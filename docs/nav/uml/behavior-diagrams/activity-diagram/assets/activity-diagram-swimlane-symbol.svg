<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .lane { fill: #ffffff; stroke: #6c5ce7; stroke-width: 2.5; }
    .head { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .node { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .flow { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="46" class="title">泳道符号</text>

  <rect x="100" y="90" width="980" height="270" class="lane" />
  <line x1="426" y1="90" x2="426" y2="360" class="lane" />
  <line x1="752" y1="90" x2="752" y2="360" class="lane" />

  <rect x="100" y="90" width="326" height="42" class="head" />
  <rect x="426" y="90" width="326" height="42" class="head" />
  <rect x="752" y="90" width="328" height="42" class="head" />
  <text x="236" y="117" class="text">用户</text>
  <text x="546" y="117" class="text">订单系统</text>
  <text x="880" y="117" class="text">支付系统</text>

  <rect x="168" y="182" width="190" height="52" rx="14" class="node" />
  <text x="220" y="214" class="text">提交订单</text>

  <rect x="486" y="182" width="200" height="52" rx="14" class="node" />
  <text x="536" y="214" class="text">创建待支付单</text>

  <rect x="816" y="182" width="200" height="52" rx="14" class="node" />
  <text x="876" y="214" class="text">发起支付</text>

  <line x1="358" y1="208" x2="486" y2="208" class="flow" />
  <line x1="686" y1="208" x2="816" y2="208" class="flow" />

  <text x="100" y="394" class="text">泳道把动作按责任主体分组，箭头跨泳道时表示跨角色/跨系统协作。</text>
</svg>
