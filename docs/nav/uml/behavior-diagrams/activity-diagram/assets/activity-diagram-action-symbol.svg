<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .node { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
  </style>

  <text x="40" y="46" class="title">动作节点符号</text>

