<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .line { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="46" class="title">起始节点符号</text>

  <circle cx="230" cy="160" r="16" fill="#2d3436" />
  <line x1="246" y1="160" x2="430" y2="160" class="line" />
  <rect x="430" y="130" width="200" height="60" rx="16" fill="#f8f9ff" stroke="#6c5ce7" stroke-width="2.5" />
  <text x="490" y="167" class="text">提交申请</text>

  <text x="720" y="146" class="text">实心圆表示流程开始位置。</text>
  <text x="720" y="176" class="text">通常从起始节点沿箭头进入第一个动作。</text>
</svg>
