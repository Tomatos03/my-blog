<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="400" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .node { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .bar { fill: #6c5ce7; }
    .flow { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="46" class="title">分叉与汇合节点符号</text>

  <!-- Start Node -->
  <rect x="365" y="20" width="120" height="40" rx="10" class="node" />
  <text x="395" y="45" class="text">发起查询</text>
  <path d="M425,60 L425,85" class="flow" />

  <!-- Fork Bar -->
  <rect x="225" y="85" width="400" height="10" class="bar" />

  <!-- Parallel Nodes -->
  <rect x="100" y="160" width="150" height="50" rx="12" class="node" />
  <text x="142" y="191" class="text">查询价格</text>

  <rect x="350" y="160" width="150" height="50" rx="12" class="node" />
  <text x="392" y="191" class="text">查询优惠</text>

  <rect x="600" y="160" width="150" height="50" rx="12" class="node" />
  <text x="642" y="191" class="text">查询库存</text>

  <!-- Fork Arrows (Step/Polyline) -->
  <path d="M275,95 L275,130 L175,130 L175,160" class="flow" />
  <path d="M425,95 L425,160" class="flow" />
  <path d="M575,95 L575,130 L675,130 L675,160" class="flow" />

  <!-- Join Bar -->
  <rect x="225" y="275" width="400" height="10" class="bar" />

  <!-- Join Arrows (Step/Polyline) -->
  <path d="M175,210 L175,240 L275,240 L275,275" class="flow" />
  <path d="M425,210 L425,275" class="flow" />
  <path d="M675,210 L675,240 L575,240 L575,275" class="flow" />

  <!-- End Node -->
  <rect x="350" y="330" width="150" height="50" rx="12" class="node" />
  <text x="373" y="361" class="text">汇总结算结果</text>
  <path d="M425,285 L425,330" class="flow" />

  <!-- Legend -->
  <text x="780" y="160" class="text" font-weight="bold">符号说明：</text>
  <text x="780" y="190" class="text">· 上粗条：并发分叉</text>
  <text x="780" y="220" class="text">· 下粗条：并发汇合</text>
  <text x="780" y="250" class="text" font-size="13">所有分支完成后流程继续</text>
</svg>
