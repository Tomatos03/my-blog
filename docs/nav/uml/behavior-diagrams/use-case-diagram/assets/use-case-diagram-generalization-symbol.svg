  <line x1="260" y1="150" x2="278" y2="176" class="line" />
  <text x="238" y="202" class="text">用户（父）</text>

  <circle cx="560" cy="100" r="14" class="line" />
  <line x1="560" y1="114" x2="560" y2="150" class="line" />
  <line x1="540" y1="130" x2="580" y2="130" class="line" />
  <line x1="560" y1="150" x2="542" y2="176" class="line" />
  <line x1="560" y1="150" x2="578" y2="176" class="line" />
