<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="280" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .usecase { fill: #ffffff; stroke: #6c5ce7; stroke-width: 2.5; }
    .dep { stroke: #6c5ce7; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="46" class="title">扩展（&lt;&lt;extend&gt;&gt;）符号</text>

  <ellipse cx="220" cy="144" rx="120" ry="38" class="usecase" />
  <text x="164" y="150" class="text">使用优惠券</text>
  <ellipse cx="620" cy="144" rx="120" ry="38" class="usecase" />
  <text x="572" y="150" class="text">提交订单</text>
  <line x1="340" y1="144" x2="500" y2="144" class="dep" />
  <text x="352" y="126" class="text">&lt;&lt;extend&gt;&gt;</text>

  <text x="810" y="164" class="text">语义：A 在条件满足时扩展 B（A 可选）。</text>
</svg>
