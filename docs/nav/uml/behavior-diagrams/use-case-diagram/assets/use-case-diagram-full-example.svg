  <ellipse cx="980" cy="220" rx="120" ry="42" class="usecase" />
  <text x="932" y="227" class="text">使用优惠券</text>

  <line x1="680" y1="360" x2="860" y2="360" class="dep" />
  <rect x="730" y="320" width="122" height="24" fill="#ffffff" />
  <text x="742" y="338" class="small">&lt;&lt;include&gt;&gt;</text>

  <line x1="860" y1="240" x2="680" y2="332" class="dep" />
  <rect x="738" y="258" width="118" height="24" fill="#ffffff" />
  <text x="750" y="276" class="small">&lt;&lt;extend&gt;&gt;</text>

  <circle cx="140" cy="180" r="16" class="line" />
  <line x1="140" y1="196" x2="140" y2="242" class="line" />
  <line x1="114" y1="216" x2="166" y2="216" class="line" />
