<svg width="1400" height="760" viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="760" fill="#ffffff" />
  <style>
    .title { font: 700 24px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 16px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .small { font: 14px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .line { stroke: #636e72; stroke-width: 2.5; fill: none; }
    .boundary { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .usecase { fill: #ffffff; stroke: #6c5ce7; stroke-width: 2.5; }
    .dep { stroke: #6c5ce7; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; marker-end: url(#depArrow); }
  </style>
  <defs>
    <marker id="depArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="50" class="title">用例图综合示例（包含所有核心符号）</text>

  <rect x="300" y="100" width="860" height="590" class="boundary" rx="10" />
  <text x="332" y="138" class="text">商城系统（系统边界）</text>

  <ellipse cx="560" cy="220" rx="120" ry="42" class="usecase" />
