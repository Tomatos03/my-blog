  <polygon points="140,340 126,366 154,366" fill="#ffffff" stroke="#636e72" stroke-width="2.5" />
  <line x1="140" y1="366" x2="140" y2="524" class="line" />

  <line x1="166" y1="216" x2="440" y2="220" class="line" />
