<svg width="1500" height="900" viewBox="0 0 1500 900" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="900" fill="#ffffff" />
  <style>
    .title { font: 700 24px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 16px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .small { font: 14px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .state { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .flow { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="52" class="title">状态机图综合示例（状态节点 + 迁移标注 + 自循环 + 复合状态 + 历史状态）</text>

  <circle cx="110" cy="220" r="12" fill="#2d3436" />
  <rect x="190" y="190" width="190" height="62" class="state" rx="20" />
  <text x="256" y="228" class="text">待支付</text>
  <line x1="122" y1="220" x2="190" y2="220" class="flow" />

  <rect x="500" y="190" width="190" height="62" class="state" rx="20" />
  <text x="566" y="228" class="text">已支付</text>
  <line x1="380" y1="221" x2="500" y2="221" class="flow" />
  <rect x="388" y="168" width="300" height="24" fill="#ffffff" />
  <text x="394" y="185" class="small">paySuccess(txId) [amount &gt; 0] / writePayLog()</text>

  <path d="M690 221 C800 156, 800 286, 690 221" class="flow" />
  <rect x="806" y="168" width="250" height="24" fill="#ffffff" />
  <text x="812" y="185" class="small">recheckPay() [networkFail] / logRetry()</text>

  <line x1="690" y1="221" x2="810" y2="221" class="flow" />
  <text x="730" y="203" class="small">ship()</text>

  <rect x="810" y="120" width="420" height="320" class="state" rx="10" />
  <text x="842" y="156" class="text">配送中（复合状态）</text>

  <circle cx="860" cy="210" r="10" fill="#2d3436" />
  <rect x="930" y="182" width="150" height="56" class="state" rx="16" />
  <text x="982" y="216" class="small">分拣中</text>
  <rect x="1120" y="182" width="150" height="56" class="state" rx="16" />
  <text x="1172" y="216" class="small">在途</text>
  <circle cx="980" cy="340" r="20" fill="#ffffff" stroke="#6c5ce7" stroke-width="2.5" />
  <text x="972" y="346" class="small">H</text>

  <line x1="870" y1="210" x2="930" y2="210" class="flow" />
  <line x1="1080" y1="210" x2="1120" y2="210" class="flow" />
  <text x="1086" y="194" class="small">sortDone()</text>
  <line x1="1195" y1="238" x2="1000" y2="328" class="flow" />
  <text x="1112" y="300" class="small">pause()</text>
  <line x1="1000" y1="328" x2="1140" y2="238" class="flow" />
  <text x="1054" y="262" class="small">resume()</text>

  <line x1="1020" y1="440" x2="1020" y2="520" class="flow" />
  <text x="1032" y="486" class="small">confirmReceive()</text>
  <rect x="920" y="520" width="200" height="62" class="state" rx="20" />
  <text x="986" y="558" class="text">已完成</text>

  <line x1="1020" y1="582" x2="1020" y2="670" class="flow" />
  <circle cx="1020" cy="692" r="14" fill="#ffffff" stroke="#2d3436" stroke-width="2.5" />
  <circle cx="1020" cy="692" r="7" fill="#2d3436" />
</svg>
