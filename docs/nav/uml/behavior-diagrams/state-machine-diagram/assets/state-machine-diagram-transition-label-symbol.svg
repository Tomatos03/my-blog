<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="340" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .state { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .flow { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="48" class="title">迁移标注符号</text>

  <rect x="170" y="170" width="200" height="62" class="state" rx="20" />
  <text x="236" y="208" class="text">待支付</text>

  <rect x="560" y="170" width="200" height="62" class="state" rx="20" />
  <text x="626" y="208" class="text">已支付</text>

  <line x1="370" y1="201" x2="560" y2="201" class="flow" />
  <rect x="380" y="146" width="310" height="26" fill="#ffffff" />
  <text x="390" y="164" class="text">paySuccess(txId) [amount &gt; 0] / writePayLog()</text>

  <text x="170" y="292" class="text">格式：事件 [守卫条件] / 动作</text>
</svg>
