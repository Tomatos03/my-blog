<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="340" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .axis { stroke: #636e72; stroke-width: 2.5; }
    .stateLine { stroke: #6c5ce7; stroke-width: 3; fill: none; }
  </style>

  <text x="40" y="48" class="title">时间轴与状态线符号</text>

  <line x1="120" y1="250" x2="1080" y2="250" class="axis" />
  <text x="1050" y="276" class="text">time</text>

  <polyline points="160,210 380,210 380,170 640,170 640,130 920,130" class="stateLine" />
  <text x="166" y="204" class="text">INIT</text>
  <text x="394" y="164" class="text">PROCESSING</text>
  <text x="656" y="124" class="text">SUCCESS</text>

  <line x1="380" y1="118" x2="380" y2="260" stroke="#636e72" stroke-dasharray="6 4" />
  <text x="366" y="282" class="text">t1</text>
  <line x1="640" y1="118" x2="640" y2="260" stroke="#636e72" stroke-dasharray="6 4" />
  <text x="626" y="282" class="text">t2</text>
</svg>
