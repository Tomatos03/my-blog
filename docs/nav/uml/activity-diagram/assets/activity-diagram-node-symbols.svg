<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">活动图常见节点符号</title>
  <desc id="desc">活动图中起始节点、结束节点、动作节点、决策/合并节点、分叉/汇合节点示意</desc>
  <defs>
    <style>
      .title { font: 700 26px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #222; }
      .label { font: 600 20px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #222; }
      .desc { font: 16px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #444; }
      .line { stroke: #e9e9e9; stroke-width: 1; }
      .shape { stroke: #6c5ce7; stroke-width: 3; fill: #ffffff; }
      .bar { fill: #6c5ce7; }
      .fill-dark { fill: #222; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" fill="#ffffff" />
  <text x="36" y="50" class="title">活动图常见节点符号（直接图示）</text>

  <line x1="28" y1="90" x2="1172" y2="90" class="line" />
  <line x1="28" y1="170" x2="1172" y2="170" class="line" />
  <line x1="28" y1="250" x2="1172" y2="250" class="line" />
  <line x1="28" y1="330" x2="1172" y2="330" class="line" />
  <line x1="28" y1="410" x2="1172" y2="410" class="line" />
  <line x1="28" y1="490" x2="1172" y2="490" class="line" />

  <text x="42" y="142" class="label">起始节点</text>
  <circle cx="340" cy="132" r="16" class="fill-dark" />
  <text x="820" y="140" class="desc">实心圆，表示流程开始</text>

  <text x="42" y="222" class="label">结束节点</text>
  <circle cx="340" cy="212" r="18" class="shape" />
  <circle cx="340" cy="212" r="11" class="fill-dark" />
  <text x="820" y="220" class="desc">同心圆，表示流程结束</text>

  <text x="42" y="302" class="label">动作节点</text>
  <rect x="270" y="276" rx="12" ry="12" width="210" height="46" class="shape" />
  <text x="300" y="306" class="desc">校验参数</text>
  <text x="820" y="300" class="desc">圆角矩形，表示一个处理动作</text>

  <text x="42" y="382" class="label">决策 / 合并节点</text>
  <polygon points="340,346 376,382 340,418 304,382" class="shape" />
  <text x="820" y="380" class="desc">菱形，用于条件分支或分支汇合</text>

  <text x="42" y="462" class="label">分叉 / 汇合节点</text>
  <rect x="270" y="448" width="210" height="16" class="bar" />
  <text x="820" y="460" class="desc">粗横线，用于并发分叉或同步汇合</text>
</svg>
