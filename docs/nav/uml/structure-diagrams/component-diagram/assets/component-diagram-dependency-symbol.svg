<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#ffffff" />
  <style>
    .title { font: 700 22px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .text { font: 15px "Microsoft YaHei", sans-serif; fill: #2d3436; }
    .component { fill: #f8f9ff; stroke: #6c5ce7; stroke-width: 2.5; }
    .dep { stroke: #6c5ce7; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c5ce7" />
    </marker>
  </defs>

  <text x="40" y="46" class="title">依赖关系符号</text>

  <rect x="180" y="96" width="300" height="130" class="component" rx="8" />
  <text x="286" y="170" class="text">网关组件</text>

  <rect x="660" y="96" width="300" height="130" class="component" rx="8" />
  <text x="766" y="170" class="text">订单组件</text>

  <line x1="480" y1="160" x2="660" y2="160" class="dep" />

  <text x="180" y="268" class="text">箭头从依赖方指向被依赖方：网关组件依赖订单组件。</text>
</svg>
